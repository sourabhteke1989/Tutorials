server:
  port: 8080

spring:
  application:
    name: crud-framework-example

  # H2 in-memory database
  datasource:
    url: jdbc:h2:mem:cruddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # Initialise schema and data
  sql:
    init:
      mode: always

  # H2 console (http://localhost:8080/h2-console)
  h2:
    console:
      enabled: true
      path: /h2-console

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# CRUD Framework configuration
crud:
  framework:
    base-path: /api/crud

# Logging
logging:
  level:
    com.framework.crud: DEBUG
    com.example.crud: DEBUG
    org.springframework.security: INFO
